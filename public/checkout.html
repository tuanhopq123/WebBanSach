<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanh Toán — Bookstore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    .navbar {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    }

    .checkout-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      padding: 2.5rem;
      margin-bottom: 2rem;
      border: none;
    }

    .checkout-header {
      font-weight: 800;
      font-size: 1.25rem;
      color: #1e293b;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-card {
      background: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%);
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      padding: 2rem;
    }

    .btn-pay {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      padding: 1rem;
      transition: all .2s ease;
      width: 100%;
      box-shadow: 0 4px 12px rgba(16, 185, 129, .2);
    }

    .btn-pay:hover {
      box-shadow: 0 8px 25px rgba(16, 185, 129, .35);
      transform: translateY(-2px);
      color: #fff;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: 0 0 0 4px rgba(79, 70, 229, .1);
      border-color: #4f46e5;
    }

    .qr-box {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      border: 2px dashed #cbd5e1;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="/">📚 Bookstore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white" href="/">Cửa hàng</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/cart.html">Giỏ hàng</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div style="background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%); padding: 2.5rem 0; margin-bottom: 2rem;">
    <div class="container text-center">
      <h2 class="fw-bold text-dark mb-0">💳 Thanh Toán An Toàn</h2>
    </div>
  </div>

  <main class="container mb-5">
    <div id="checkout-root">
      <div class="text-center py-5 my-5 text-muted">Đang tải thông tin thanh toán...</div>
    </div>
  </main>

  <footer class="bg-dark py-4 mt-auto text-white">
    <div class="container text-center small opacity-75">
      <p class="mb-1 fw-bold fs-6">📚 Bookstore</p>
      <div>© 2026 Bản quyền thuộc về WebBanSach.</div>
    </div>
  </footer>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/pages/checkout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
