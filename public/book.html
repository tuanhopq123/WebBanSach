<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi tiết sách — Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body { background: #f8fafc; font-family: 'Inter', sans-serif; }
      .navbar { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
      
      .book-detail-wrapper {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        padding: 2.5rem;
        margin-top: 2rem;
      }
      
      .book-image-carousel img {
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      }
      
      .book-title {
        font-weight: 800;
        font-size: 2rem;
        color: #1e293b;
        margin-bottom: 0.5rem;
      }
      .book-author {
        font-size: 1.1rem;
        color: #64748b;
        margin-bottom: 1.5rem;
      }
      .book-price-box {
        background: #f1f5f9;
        padding: 1.25rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
      }
      .discount-price {
        font-size: 2rem;
        font-weight: 800;
        color: #ef4444;
      }
      .original-price {
        font-size: 1.1rem;
        text-decoration: line-through;
        color: #94a3b8;
        margin-left: 0.75rem;
      }
      .bg-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
      .btn-add-cart {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border: none; padding: 0.8rem 1.5rem; font-weight: 700; color: #fff;
        transition: transform .2s ease; border-radius: 10px;
      }
      .btn-add-cart:hover { box-shadow: 0 8px 20px rgba(16,185,129,.3); transform: translateY(-2px); color: #fff; }
      
      .reviews-section {
        background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        padding: 2.5rem; margin-top: 2rem; margin-bottom: 4rem;
      }
      .review-card {
        border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
      }
      .review-card .stars { color: #f59e0b; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">📚 Bookstore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="/">Cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/cart.html">Giỏ hàng</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container">
      <div id="book-detail">
        <div class="text-center py-5 my-5 text-muted">Đang tải thông tin sách...</div>
      </div>
    </main>
    <footer class="bg-dark py-4 mt-auto text-white">
      <div class="container text-center small opacity-75">
        <p class="mb-1 fw-bold fs-6">📚 Bookstore</p>
        <div>© 2026 Bản quyền thuộc về WebBanSach.</div>
      </div>
    </footer>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/pages/bookDetail.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
