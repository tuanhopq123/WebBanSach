<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giỏ hàng — Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body { background: #f8fafc; font-family: 'Inter', sans-serif; }
      .navbar { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
      
      .cart-card {
        background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.04);
        padding: 2rem; margin-top: 1rem; border: none;
      }
      .table th { background:#f8fafc; font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; color:#6b7280; border-bottom: none; }
      .table td { vertical-align: middle; }
      
      .summary-card {
        background: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%);
        border-radius: 16px; border: 1px solid #e2e8f0; padding: 2rem;
      }
      .btn-checkout {
        background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        border: none; border-radius: 12px; font-weight: 700; color: #fff;
        padding: 1rem; transition: all .2s ease;
      }
      .btn-checkout:hover { box-shadow: 0 8px 25px rgba(79,70,229,.3); transform: translateY(-2px); color: #fff; }
      .qty-btn { background: #f8fafc; border: 1px solid #e2e8f0; color: #475569; border-radius: 8px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: all .2s; }
      .qty-btn:hover { background: #e2e8f0; }
      .qty-input { border: 1px solid #e2e8f0; text-align: center; font-weight: 600; border-radius: 8px; height: 32px; width: 50px; outline: none; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">📚 Bookstore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="/">Cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-white active" href="/cart.html">Giỏ hàng</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div style="background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%); padding: 2.5rem 0; margin-bottom: 2rem;">
      <div class="container text-center">
        <h2 class="fw-bold text-dark mb-0">🛒 Giỏ Hàng Của Bạn</h2>
      </div>
    </div>
    <main class="container mb-5">
      <div id="cart-root">
        <div class="text-center py-5 my-5 text-muted">Đang tải giỏ hàng...</div>
      </div>
    </main>
    <footer class="bg-dark py-4 mt-auto text-white">
      <div class="container text-center small opacity-75">
        <p class="mb-1 fw-bold fs-6">📚 Bookstore</p>
        <div>© 2026 Bản quyền thuộc về WebBanSach.</div>
      </div>
    </footer>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/pages/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
