<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Quản lý Mã Giảm Giá</title>
    <meta name="description" content="Trang quản trị - Quản lý mã giảm giá sách" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      body { background: #f0f2f5; }
      .admin-sidebar {
        min-height: 100vh;
        background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
        color: #fff;
        width: 220px;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        padding: 1.5rem 0;
        z-index: 100;
      }
      .admin-sidebar .brand {
        padding: 0 1.25rem 1.5rem;
        border-bottom: 1px solid rgba(255,255,255,.1);
        font-size: 1.1rem;
        font-weight: 700;
      }
      .admin-sidebar nav a {
        display: block;
        padding: .65rem 1.25rem;
        color: rgba(255,255,255,.75);
        text-decoration: none;
        font-size: .9rem;
        transition: all .2s;
        border-radius: 8px;
        margin: 2px 8px;
      }
      .admin-sidebar nav a:hover,
      .admin-sidebar nav a.active {
        background: rgba(255,255,255,.15);
        color: #fff;
      }
      .admin-main {
        margin-left: 220px;
        padding: 2rem;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="brand">📚 WebBanSach</div>
      <nav class="mt-3">
        <a href="/admin/index.html">🏠 Dashboard</a>
        <a href="/admin/books.html">📖 Sách</a>
        <a href="/admin/categories.html">📂 Danh mục</a>
        <a href="/admin/orders.html">🛒 Đơn hàng</a>
        <a href="/admin/users.html">👥 Người dùng</a>
        <a href="/admin/discounts.html" class="active">🏷️ Giảm giá</a>
        <a href="/" style="margin-top:1rem;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem;">
          ← Về trang chủ
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="admin-main">
      <div id="admin-discounts-root">
        <div class="text-center py-5 text-muted">Đang khởi tạo...</div>
      </div>
    </main>

    <script type="module" src="../js/ui.js"></script>
    <script type="module" src="../js/admin/discounts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
