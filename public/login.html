<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập & Đăng ký — Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body { background: #f8fafc; font-family: 'Inter', sans-serif; }
      .navbar { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
      .auth-container { max-width: 450px; margin: 4rem auto; }
      .auth-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        padding: 2.5rem;
      }
      .auth-header { text-align: center; margin-bottom: 2rem; }
      .nav-tabs { border-bottom: none; gap: .5rem; justify-content: center; margin-bottom: 1.5rem; }
      .nav-tabs .nav-link {
        border: none; color: #6b7280; font-weight: 600; padding: .6rem 1.5rem;
        border-radius: 12px; transition: all .25s ease;
      }
      .nav-tabs .nav-link:hover { background: #f3f4f6; }
      .nav-tabs .nav-link.active {
        background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        color: #fff;
        box-shadow: 0 4px 12px rgba(79,70,229,.3);
      }
      .form-control { border-radius: 10px; padding: .75rem 1rem; border: 1px solid #e5e7eb; }
      .form-control:focus { box-shadow: 0 0 0 4px rgba(79,70,229,.1); border-color: #4f46e5; }
      .btn-auth {
        border-radius: 10px; padding: .75rem 1rem; font-weight: 600; width: 100%;
        background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); border: none;
        transition: transform .2s ease, box-shadow .2s ease;
        color: #fff; margin-top: 1rem;
      }
      .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79,70,229,.35); color: #fff;}
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">📚 Bookstore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="/">Cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/cart.html">Giỏ hàng</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h3 class="fw-bold fs-4 mb-2">Chào mừng trở lại! 👋</h3>
            <p class="text-muted small mb-0">Đăng nhập để quản lý giỏ hàng và đơn hàng.</p>
          </div>
          <div id="auth-root"></div>
        </div>
      </div>
    </main>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/pages/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
